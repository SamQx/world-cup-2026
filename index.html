<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Cup 2026 | Fan Dashboard</title>
    <style>
        :root {
            --primary: #ffcc00;
            --glass: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.2);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            text-align: center;
            background: #111;
            transition: background 1s ease-in-out;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
        }

        .overlay {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.8));
            min-height: 100vh;
            width: 100%;
            padding-bottom: 50px;
        }

        .container { max-width: 900px; margin: 0 auto; padding: 20px; }

        .milestone-tag {
            background: var(--primary);
            color: black;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }

        h1 { font-size: clamp(1.5rem, 6vw, 3rem); margin: 20px 0; text-transform: uppercase; letter-spacing: 2px; }

        /* Digit-only Countdown Style */
        #countdown {
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            font-weight: 900;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 15px 40px;
            display: inline-flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .day-label {
            font-size: 1.2rem;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            text-align: left;
            transition: transform 0.3s;
        }

        .card:hover { transform: translateY(-5px); }

        #stadium-name { color: var(--primary); margin: 0; font-size: 1.5rem; }
        
        button {
            background: var(--primary);
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        select {
            flex-grow: 1;
            padding: 12px;
            background: rgba(0,0,0,0.7);
            color: white;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 1rem;
        }

        .result-bar-container { margin-bottom: 15px; }
        .bar-bg { background: rgba(255,255,255,0.1); height: 10px; border-radius: 5px; overflow: hidden; margin-top: 5px; }
        .bar-fill { height: 100%; background: var(--primary); transition: width 1s ease-out; }
    </style>
</head>
<body id="bg-body">

<div class="overlay">
    <div class="container">
        
        <div class="card" style="text-align: center; border-bottom: 4px solid var(--primary);">
            <span class="milestone-tag">MARCH 2026 UPDATE</span>
            <h3 style="margin: 10px 0;">Germany Joins the Contenders! 🇩🇪</h3>
            <p style="font-size: 0.9rem; opacity: 0.8;">Who will conquer North America? Predict your winner below.</p>
        </div>

        <h1>World Cup 2026</h1>
        
        <div id="countdown">
            <span id="timer-numbers">00 : 00 : 00 : 00</span>
            <span class="day-label">Days</span>
        </div>

        <div class="grid">
            <div class="card">
                <p style="font-size: 0.8rem; color: var(--primary); font-weight: bold;">STADIUM SPOTLIGHT</p>
                <h2 id="stadium-name">MetLife Stadium</h2>
                <p id="stadium-location" style="margin: 5px 0; opacity: 0.7;">NJ/NY, USA</p>
                <p id="stadium-fact" style="font-size: 0.9rem; margin-top: 15px;">Official host of the 2026 Grand Final!</p>
            </div>

            <div class="card" style="grid-column: 1 / -1;">
                <h3 style="margin-top: 0;">🏆 Predict the Champion</h3>
                <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                    <select id="teamSelect">
                        <option value="Germany">🇩🇪 Germany</option>
                        <option value="Morocco">🇲🇦 Morocco</option>
                        <option value="Portugal">🇵🇹 Portugal</option>
                        <option value="Argentina">🇦🇷 Argentina</option>
                        <option value="Spain">🇪🇸 Spain</option>
                        <option value="Brazil">🇧🇷 Brazil</option>
                        <option value="France">🇫🇷 France</option>
                        <option value="Japan">🇯🇵 Japan</option>
                        <option value="Croatia">🇭🇷 Croatia</option>
                        <option value="Belgium">🇧🇪 Belgium</option>
                        <option value="Netherlands">🇳🇱 Netherlands</option>
                        <option value="England">🏴 England</option>
                    </select>
                    <button onclick="vote()">Vote Now</button>
                </div>
                <div id="results" style="margin-top: 25px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;"></div>
            </div>
        </div>
    </div>
</div>

<script>
// --- Background Rotation ---
const stadiums = [
    { name: "MetLife Stadium", loc: "NJ/NY, USA", fact: "Official host of the 2026 Grand Final!", img: "https://images.unsplash.com/photo-1517466787929-bc90951d0974?q=80&w=2000" },
    { name: "Estadio Azteca", loc: "Mexico City, Mexico", fact: "The 1st stadium to host three opening games!", img: "https://images.unsplash.com/photo-1508098682722-e99c643e7f0b?q=80&w=2070" }
];

let sIdx = 0;
function rotateStadiums() {
    const s = stadiums[sIdx];
    document.getElementById('stadium-name').innerText = s.name;
    document.getElementById('stadium-location').innerText = s.loc;
    document.getElementById('stadium-fact').innerText = s.fact;
    document.body.style.backgroundImage = `url('${s.img}')`;
    sIdx = (sIdx + 1) % stadiums.length;
}
setInterval(rotateStadiums, 6000);
rotateStadiums();

// --- Digit-Only Countdown Logic ---
const kickoff = new Date("June 11, 2026 13:00:00").getTime();
function updateTime() {
    const d = kickoff - new Date().getTime();
    const days = Math.floor(d / 86400000);
    const hrs = Math.floor((d % 86400000) / 3600000);
    const mins = Math.floor((d % 3600000) / 60000);
    const secs = Math.floor((d % 60000) / 1000);
    
    // Formatting numbers to always show two digits (e.g., 09 instead of 9)
    const fDays = days.toString().padStart(2, '0');
    const fHrs = hrs.toString().padStart(2, '0');
    const fMins = mins.toString().padStart(2, '0');
    const fSecs = secs.toString().padStart(2, '0');

    document.getElementById("timer-numbers").innerText = `${fDays} : ${fHrs} : ${fMins} : ${fSecs}`;
}
setInterval(updateTime, 1000);
updateTime();

// --- Voting Logic ---
function vote() {
    const team = document.getElementById("teamSelect").value;
    let votes = JSON.parse(localStorage.getItem("wc26_en_v")) || {};
    votes[team] = (votes[team] || 0) + 1;
    localStorage.setItem("wc26_en_v", JSON.stringify(votes));
    displayResults();
}

function displayResults() {
    let votes = JSON.parse(localStorage.getItem("wc26_en_v")) || {};
    let total = Object.values(votes).reduce((a, b) => a + b, 0);
    let output = "";
    Object.entries(votes).sort((a,b)=>b[1]-a[1]).forEach(([team, count]) => {
        let pc = ((count/total)*100).toFixed(1);
        output += `<div class="result-bar-container">
            <div style="display:flex; justify-content:space-between; font-size:0.85rem;"><span>${team}</span><span>${pc}%</span></div>
            <div class="bar-bg"><div class="bar-fill" style="width:${pc}%"></div></div>
        </div>`;
    });
    document.getElementById("results").innerHTML = output;
}
displayResults();
</script>

</body>
</html>
